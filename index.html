<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Arion Anti-Scam</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #eaeaea);
            padding: 16px;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, #16213e);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        h2 { margin-bottom: 14px; font-size: 18px; }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #333;
            background: var(--tg-theme-bg-color, #1a1a2e);
            color: var(--tg-theme-text-color, #eaeaea);
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #e94560);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 8px;
        }
        .tabs { display: flex; gap: 8px; margin-bottom: 12px; }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background: var(--tg-theme-secondary-bg-color, #16213e);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .tab.active {
            background: var(--tg-theme-button-color, #e94560);
            color: var(--tg-theme-button-text-color, #fff);
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="tabs">
        <div class="tab active" onclick="showTab('check')">🔍 Проверить</div>
        <div class="tab" onclick="showTab('report')">🚨 Жалоба</div>
    </div>

    <div id="tab-check" class="card">
        <h2>🔍 Проверка пользователя</h2>
        <input type="text" id="checkInput" placeholder="@username или ID">
        <button onclick="checkUser()">🔍 Проверить</button>
    </div>

    <div id="tab-report" class="card hidden">
        <h2>🚨 Жалоба на скамера</h2>
        <input type="text" id="targetId" placeholder="ID или @username мошенника">
        <select id="reportType">
            <option value="scam">🚫 Скам / мошенничество</option>
            <option value="suspicious">⚠️ Подозрительное поведение</option>
            <option value="money">💸 Невозврат средств</option>
            <option value="fake">🤖 Фейковый аккаунт</option>
        </select>
        <textarea id="description" rows="4" placeholder="Опишите ситуацию..."></textarea>
        <input type="text" id="evidence" placeholder="Ссылка на доказательства (если есть)">
        <button onclick="submitReport()">🚨 Отправить жалобу</button>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    function showTab(tab) {
        document.querySelectorAll('.tab').forEach((t, i) => {
            t.classList.toggle('active',
                (tab === 'check' && i === 0) ||
                (tab === 'report' && i === 1)
            );
        });
        document.getElementById('tab-check').classList.toggle('hidden', tab !== 'check');
        document.getElementById('tab-report').classList.toggle('hidden', tab !== 'report');
    }

    function validateIdentifier(value) {
        const cleaned = value.trim().replace('@', '');
        if (/^\d{5,15}$/.test(cleaned) || /^[a-zA-Z0-9_]{4,32}$/.test(cleaned)) {
            return cleaned;
        }
        return null;
    }

    function checkUser() {
        const input = document.getElementById('checkInput').value;
        const identifier = validateIdentifier(input);

        if (!identifier) {
            tg.showPopup({
                title: '❌ Ошибка',
                message: 'Введите @username или ID',
                buttons: [{type: 'ok'}]
            });
            return;
        }

        tg.sendData(JSON.stringify({
            action: 'check',
            identifier: identifier
        }));
    }

    function submitReport() {
        const targetId = document.getElementById('targetId').value.trim();
        const reportType = document.getElementById('reportType').value;
        const description = document.getElementById('description').value.trim();
        const evidence = document.getElementById('evidence').value.trim();

        if (!targetId || !description) {
            tg.showPopup({
                title: '❌ Ошибка',
                message: 'Заполните ID и описание',
                buttons: [{type: 'ok'}]
            });
            return;
        }

        tg.sendData(JSON.stringify({
            action: 'report',
            target_id: targetId,
            target_un: targetId.startsWith('@') ? targetId : null,
            report_type: reportType,
            description: description,
            evidence: evidence || null
        }));

        tg.showPopup({
            title: '✅ Готово!',
            message: 'Жалоба отправлена! 🛡️',
            buttons: [{type: 'ok'}]
        });

        document.getElementById('targetId').value = '';
        document.getElementById('description').value = '';
        document.getElementById('evidence').value = '';
    }
</script>
</body>
</html>
